<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar SCADA NOC Dashboard</title>
    
    <!-- ฟอนต์ IBM Plex Sans Thai ระดับ Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"IBM Plex Sans Thai"', 'sans-serif'],
                    },
                    colors: {
                        noc: {
                            bg: '#050B14',
                            panel: 'rgba(12, 22, 45, 0.65)',
                            border: 'rgba(0, 240, 255, 0.15)',
                            cyan: '#00F0FF',
                            gold: '#F6C453',
                            orange: '#FF8A00',
                            green: '#00FF66',
                            textpri: '#F8FAFC',
                            textsec: '#64748B'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    
    <!-- React & Recharts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

    <style>
        /* บังคับเต็มจอแบบ 100vh ไม่มี Scroll นอกกรอบ */
        body, html { 
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden;
            background-color: #050B14;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 138, 0, 0.08), transparent 25%);
            color: #F8FAFC;
        }
        
        /* Glass Panel สไตล์ SCADA/NOC */
        .scada-panel {
            background: rgba(12, 22, 45, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 240, 255, 0.02);
            border-radius: 16px;
        }

        /* ตกแต่ง Scrollbar ให้ดูเป็นเส้นแสง */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(0, 240, 255, 0.8); }

        /* Animation เส้นพลังงานแบบ Tesla */
        .power-flow-line {
            stroke-dasharray: 8 8;
            animation: flow 1.5s linear infinite;
        }
        @keyframes flow {
            from { stroke-dashoffset: 16; }
            to { stroke-dashoffset: 0; }
        }

        /* Glowing Text */
        .glow-text-gold { text-shadow: 0 0 15px rgba(246, 196, 83, 0.5); }
        .glow-text-cyan { text-shadow: 0 0 15px rgba(0, 240, 255, 0.5); }
    </style>
</head>
<body class="antialiased font-sans">
    
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { AreaChart, Area, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, ResponsiveContainer, RadialBarChart, RadialBar, Cell, PieChart, Pie } = window.Recharts;

        // ---- Icons (Lucide) ----
        const Icons = {
            Sun: <><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></>,
            Lightbulb: <><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></>,
            CheckCircle2: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
            Clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
            MapPin: <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></>,
            RefreshCw: <><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></>,
            Activity: <><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></>,
            Battery: <><rect x="1" y="6" width="18" height="12" rx="2" ry="2"/><line x1="23" y1="13" x2="23" y2="11"/></>,
            Cpu: <><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></>,
            Radio: <><circle cx="12" cy="12" r="2"/><path d="M4.93 19.07a10 10 0 0 1 0-14.14"/><path d="M7.76 16.24a6 6 0 0 1 0-8.49"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></>
        };

        const Icon = ({ name, className = "", size = 20 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {Icons[name]}
            </svg>
        );

        const Dashboard = () => {
            const [projectInfo, setProjectInfo] = useState({
                title: "SMART SOLAR STREETLIGHT MGT.",
                location: "BANG BUA THONG, NONTHABURI",
                total: 224,
                installed: 14,
                remaining: 210,
                progress: 6.25
            });

            const [locationData, setLocationData] = useState([
                { id: 1, name: 'ซอยสนเพชร', shortName: 'ซ.สนเพชร', total: 14, installed: 0, remaining: 14 },
                { id: 2, name: 'ซอยหมอฟา', shortName: 'ซ.หมอฟา', total: 19, installed: 0, remaining: 19 },
                { id: 3, name: 'ถนนเลียบคลองพระพิมล', shortName: 'ถ.คลองพระพิมล', total: 41, installed: 14, remaining: 27 },
                { id: 4, name: 'ถนนเลียบคลองลากค้อน', shortName: 'ถ.คลองลากค้อน', total: 43, installed: 0, remaining: 43 },
                { id: 5, name: 'ถนนเส้นบ้านผู้ใหญ่ชูถึงบ้านบังตุ๊', shortName: 'ถ.บ้านผู้ใหญ่ชูฯ', total: 35, installed: 0, remaining: 35 },
                { id: 6, name: 'ถนนประดูน้ำคลองลำสีถึงบ้านนาย', shortName: 'ถ.คลองลำสีฯ', total: 26, installed: 0, remaining: 26 },
                { id: 7, name: 'ถนนเลียบคลองลัดตาต่อม', shortName: 'ถ.คลองลัดตาต่อม', total: 8, installed: 0, remaining: 8 },
            ]);

            const defaultSheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQjbLRt-AUTah9KormRCSDgSgIsE5Oa5HKdXuVtbIG6ZSkHae_OVIN9M8hbrhvzAw/pub?output=csv';
            const [isFetching, setIsFetching] = useState(false);
            const [lastUpdated, setLastUpdated] = useState(new Date());

            const fetchFromSheet = async () => {
                setIsFetching(true);
                try {
                    const response = await fetch(defaultSheetUrl);
                    if (response.ok) {
                        const text = await response.text();
                        const lines = text.split('\n');
                        const infoLine = lines[4].split(',');
                        const newTotal = parseInt(infoLine[1]) || 0;
                        const newInstalled = parseInt(infoLine[3]) || 0;
                        const newRemaining = parseInt(infoLine[5]) || 0;
                        const newProgress = newTotal > 0 ? ((newInstalled / newTotal) * 100).toFixed(2) : 0;

                        setProjectInfo(prev => ({
                            ...prev, total: newTotal, installed: newInstalled, remaining: newRemaining, progress: parseFloat(newProgress)
                        }));

                        const startIdx = lines.findIndex(l => l.includes('พิกัดจุดที่'));
                        if (startIdx !== -1) {
                            const newLocs = [];
                            for (let i = startIdx + 1; i < lines.length; i++) {
                                if (!lines[i] || lines[i].trim() === '') continue;
                                const cols = lines[i].split(',');
                                // ป้องกันการนำแถว "รวม" มาใส่เป็น Zone
                                if (cols[1] && cols[1].includes('รวม')) continue;
                                if (cols.length > 2 && cols[1] && !isNaN(parseInt(cols[2]))) {
                                    let short = cols[1].replace(/^\d+\.\s*/, '');
                                    if(short.length > 15) short = short.substring(0, 15) + '...';
                                    newLocs.push({
                                        id: i, name: cols[1].replace(/^\d+\.\s*/, ''), shortName: short,
                                        total: parseInt(cols[2] || 0), installed: parseInt(cols[3] || 0), remaining: parseInt(cols[4] || 0)
                                    });
                                }
                            }
                            if (newLocs.length > 0) setLocationData(newLocs);
                        }
                        setLastUpdated(new Date());
                    }
                } catch (error) { console.error(error); } 
                finally { setIsFetching(false); }
            };

            useEffect(() => { fetchFromSheet(); }, []);

            // ---- Components ----
            const NOCMetricCard = ({ title, value, subtitle, icon, color = 'cyan' }) => {
                const colorMap = {
                    cyan: 'text-noc-cyan border-noc-cyan shadow-[0_0_15px_rgba(0,240,255,0.2)]',
                    gold: 'text-noc-gold border-noc-gold shadow-[0_0_15px_rgba(246,196,83,0.2)]',
                    orange: 'text-noc-orange border-noc-orange shadow-[0_0_15px_rgba(255,138,0,0.2)]',
                    green: 'text-noc-green border-noc-green shadow-[0_0_15px_rgba(0,255,102,0.2)]'
                };
                const bgMap = {
                    cyan: 'from-noc-cyan/20 to-transparent',
                    gold: 'from-noc-gold/20 to-transparent',
                    orange: 'from-noc-orange/20 to-transparent',
                    green: 'from-noc-green/20 to-transparent'
                };
                
                return (
                    <div className="scada-panel p-4 relative overflow-hidden flex flex-col justify-center h-full group">
                        <div className={`absolute top-0 right-0 w-24 h-24 bg-gradient-to-bl ${bgMap[color]} opacity-50 blur-2xl`}></div>
                        
                        <div className="flex justify-between items-start mb-2 relative z-10">
                            <h3 className="text-sm font-semibold text-noc-textsec uppercase tracking-widest">{title}</h3>
                            <div className={`p-1.5 rounded border border-opacity-50 bg-black/50 ${colorMap[color]} group-hover:scale-110 transition-transform`}>
                                <Icon name={icon} size={16} />
                            </div>
                        </div>

                        <div className="relative z-10">
                            <div className={`text-4xl xl:text-5xl font-black tracking-tight ${color === 'gold' ? 'glow-text-gold text-noc-gold' : color === 'cyan' ? 'glow-text-cyan text-noc-cyan' : color === 'green' ? 'text-noc-green' : 'text-noc-orange'}`}>
                                {value}
                            </div>
                            {subtitle && <p className="text-[11px] text-noc-textsec mt-1 uppercase">{subtitle}</p>}
                        </div>
                    </div>
                );
            };

            // Horizontal Left -> Right Power Flow Component
            const PowerFlowWidget = () => (
                <div className="h-full w-full relative min-h-[220px] overflow-visible">
                    {/* SVG Connections */}
                    <svg className="absolute inset-0 w-full h-full pointer-events-none" style={{ zIndex: 0 }}>
                        {/* Solar (Left 20%) to Battery (Center 50%) */}
                        <path d="M 20%,50% L 50%,50%" fill="none" stroke="#F6C453" strokeWidth="2" className="power-flow-line" />
                        {/* Battery (Center 50%) to LED (Right 80%) */}
                        <path d="M 50%,50% L 80%,50%" fill="none" stroke="#00F0FF" strokeWidth="2" className="power-flow-line" />
                    </svg>

                    {/* Nodes positioned perfectly at the SVG junction points */}
                    
                    {/* Solar (Left) */}
                    <div className="absolute top-[50%] left-[20%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center z-10">
                        <span className="text-noc-gold font-bold text-[11px] lg:text-xs mb-2 whitespace-nowrap drop-shadow-md">แผงโซล่าเซลล์</span>
                        <div className="w-14 h-14 rounded-xl bg-black/90 border-2 border-noc-gold shadow-[0_0_15px_rgba(246,196,83,0.5)] flex items-center justify-center relative">
                            <div className="absolute inset-0 rounded-xl border border-noc-gold border-dashed animate-[spin_10s_linear_infinite] opacity-50"></div>
                            <Icon name="Sun" size={28} className="text-noc-gold animate-pulse-slow" />
                        </div>
                        <span className="text-noc-gold font-mono text-[10px] mt-2 whitespace-nowrap bg-black/60 px-2 py-0.5 rounded">GENERATION</span>
                    </div>

                    {/* Battery (Center) */}
                    <div className="absolute top-[50%] left-[50%] transform -translate-x-1/2 -translate-y-1/2 z-10 flex flex-col items-center">
                        <span className="text-noc-green font-bold text-[11px] lg:text-xs mb-2 whitespace-nowrap drop-shadow-md">แบตเตอรี่</span>
                        <div className="bg-gradient-to-b from-slate-100 to-slate-300 w-24 h-12 rounded shadow-[0_5px_15px_rgba(0,0,0,0.8)] flex relative overflow-hidden border border-slate-400">
                            {/* Green battery level indicator on the right edge */}
                            <div className="absolute right-0 top-0 bottom-0 w-3 bg-noc-green shadow-[0_0_10px_rgba(0,255,102,1)]"></div>
                            <div className="w-full flex flex-col items-center justify-center pr-2 h-full">
                                <span className="text-slate-800 font-black text-xs tracking-widest leading-none">BATTERY</span>
                                <span className="text-slate-600 font-bold text-[10px] mt-1 tracking-wider leading-none">100%</span>
                            </div>
                        </div>
                        <span className="text-noc-green font-mono text-[10px] mt-2 whitespace-nowrap bg-black/60 px-2 py-0.5 rounded">STORAGE</span>
                    </div>

                    {/* LED (Right) */}
                    <div className="absolute top-[50%] left-[80%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center z-10">
                        <span className="text-noc-cyan font-bold text-[11px] lg:text-xs mb-2 whitespace-nowrap drop-shadow-md">โคมไฟถนน LED</span>
                        <div className="w-14 h-14 rounded-full bg-black/90 border-2 border-noc-cyan shadow-[0_0_15px_rgba(0,240,255,0.5)] flex items-center justify-center relative">
                            <div className="absolute inset-0 rounded-full border border-noc-cyan border-dashed animate-[spin_10s_linear_infinite_reverse] opacity-50"></div>
                            <Icon name="Lightbulb" size={28} className="text-noc-cyan" />
                        </div>
                        <span className="text-noc-cyan font-mono text-[10px] mt-2 whitespace-nowrap bg-black/60 px-2 py-0.5 rounded">LOAD</span>
                    </div>
                </div>
            );

            // Recharts Custom Tooltip (NOC Style)
            const CustomTooltip = ({ active, payload, label }) => {
                if (active && payload && payload.length) {
                    return (
                        <div className="bg-black/90 border border-noc-cyan/30 p-3 rounded-lg shadow-[0_0_15px_rgba(0,240,255,0.2)]">
                            <p className="text-white text-xs font-bold mb-2 border-b border-white/10 pb-1">{label}</p>
                            {payload.map((entry, index) => (
                                <p key={index} className="text-[11px] flex items-center justify-between gap-4 font-mono">
                                    <span style={{ color: entry.color }}>{entry.name}</span>
                                    <span className="text-white font-bold">{entry.value}</span>
                                </p>
                            ))}
                        </div>
                    );
                }
                return null;
            };

            return (
                <div className="h-full w-full flex flex-col p-3 lg:p-4 mx-auto max-w-[1920px] gap-3">
                    
                    {/* TOP BAR - Huawei NOC Style */}
                    <header className="flex-none scada-panel px-5 py-3 flex justify-between items-center bg-black/40">
                        <div className="flex items-center gap-4">
                            {/* Premium Solar Glowing Logo */}
                            <div className="relative flex items-center justify-center w-12 h-12">
                                <div className="absolute inset-0 rounded-full bg-noc-gold opacity-20 animate-ping" style={{ animationDuration: '2s' }}></div>
                                <div className="absolute inset-1 rounded-full bg-noc-orange opacity-40 animate-pulse"></div>
                                <div className="relative w-10 h-10 rounded-full bg-black border border-noc-gold shadow-[0_0_20px_rgba(246,196,83,0.8)] flex items-center justify-center z-10">
                                    <Icon name="Sun" size={24} className="text-noc-gold drop-shadow-[0_0_10px_rgba(246,196,83,1)]" />
                                </div>
                            </div>
                            <div>
                                <h1 className="text-lg md:text-xl font-bold text-white tracking-widest flex items-center gap-3">
                                    Solar Dashboard
                                    <span className="px-2 py-0.5 bg-noc-gold/10 border border-noc-gold/40 text-noc-gold text-[9px] font-bold rounded uppercase tracking-widest shadow-[0_0_10px_rgba(246,196,83,0.2)]">
                                        LIVE
                                    </span>
                                </h1>
                                <p className="text-noc-textsec text-[11px] tracking-wide mt-0.5">
                                    โครงการติดตั้งโคมไฟถนนพลังงานแสงอาทิตย์
                                </p>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-6">
                            <div className="hidden md:flex gap-6 text-[11px] font-mono text-noc-cyan">
                                <div className="flex flex-col"><span className="text-slate-500">SYSTEM STATUS</span><span className="text-noc-green flex items-center"><Icon name="CheckCircle2" size={12} className="mr-1"/> ONLINE</span></div>
                                <div className="flex flex-col"><span className="text-slate-500">API SYNC</span><span>{lastUpdated.toLocaleTimeString('th-TH')}</span></div>
                            </div>
                            <button onClick={fetchFromSheet} disabled={isFetching} className="p-2 bg-noc-cyan/10 border border-noc-cyan/30 rounded text-noc-cyan hover:bg-noc-cyan hover:text-black transition-colors">
                                <Icon name="RefreshCw" className={isFetching ? 'animate-spin' : ''} size={18} />
                            </button>
                        </div>
                    </header>

                    {/* KPI ROW */}
                    <div className="flex-none grid grid-cols-2 md:grid-cols-4 gap-3">
                        <NOCMetricCard title="Total Capacity" value={projectInfo.total} subtitle="โคมไฟเป้าหมายทั้งหมด" icon="MapPin" color="cyan" />
                        <NOCMetricCard title="Active Nodes" value={projectInfo.installed} subtitle="ดำเนินการเสร็จสิ้น" icon="Radio" color="green" />
                        <NOCMetricCard title="Pending Deploy" value={projectInfo.remaining} subtitle="จุดรอดำเนินการติดตั้ง" icon="Clock" color="orange" />
                        <NOCMetricCard title="Sys. Progress" value={`${projectInfo.progress}%`} subtitle="เปอร์เซ็นต์ความสำเร็จ" icon="Activity" color="gold" />
                    </div>

                    {/* MAIN CONTENT 3 COLUMNS */}
                    <div className="flex-1 flex flex-col lg:flex-row gap-3 min-h-0">
                        
                        {/* LEFT: Power Flow & Radial Gauge (25%) */}
                        <div className="lg:w-1/4 flex flex-col gap-3 min-h-0 flex-none lg:flex-1">
                            {/* Tesla Power Flow */}
                            <div className="flex-1 scada-panel flex flex-col overflow-hidden min-h-[220px]">
                                <div className="bg-black/30 px-4 py-3 border-b border-white/5 flex items-center text-xs font-bold tracking-widest text-noc-textsec uppercase">
                                    <Icon name="Activity" size={14} className="mr-2 text-noc-cyan"/> POWER FLOW
                                </div>
                                <div className="flex-1 relative">
                                    <PowerFlowWidget />
                                </div>
                            </div>

                            {/* CAPACITY OVERVIEW */}
                            <div className="flex-1 scada-panel flex flex-col min-h-[200px]">
                                <div className="bg-black/30 px-4 py-3 border-b border-white/5 text-xs font-bold tracking-widest text-noc-textsec uppercase">
                                    CAPACITY OVERVIEW
                                </div>
                                <div className="flex-1 relative p-2 flex flex-col">
                                    <div className="flex-1 relative min-h-[100px]">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <PieChart>
                                                <Pie
                                                    data={[
                                                        { name: 'ดำเนินการเสร็จสิ้น', value: projectInfo.installed, color: '#00F0FF' },
                                                        { name: 'จุดรอดำเนินการติดตั้ง', value: projectInfo.remaining, color: '#FF8A00' }
                                                    ]}
                                                    cx="50%" cy="50%" innerRadius="65%" outerRadius="85%"
                                                    dataKey="value" stroke="none" paddingAngle={2}
                                                >
                                                    {[
                                                        { name: 'ดำเนินการเสร็จสิ้น', value: projectInfo.installed, color: '#00F0FF' },
                                                        { name: 'จุดรอดำเนินการติดตั้ง', value: projectInfo.remaining, color: '#FF8A00' }
                                                    ].map((entry, index) => (
                                                        <Cell key={`cell-${index}`} fill={entry.color} />
                                                    ))}
                                                </Pie>
                                                <RechartsTooltip content={<CustomTooltip />} />
                                            </PieChart>
                                        </ResponsiveContainer>
                                        <div className="absolute inset-0 flex flex-col items-center justify-center">
                                            <span className="text-3xl lg:text-4xl font-black text-noc-cyan glow-text-cyan">{projectInfo.progress}%</span>
                                            <span className="text-[10px] lg:text-xs text-noc-textsec uppercase font-mono mt-1">COMPLETED</span>
                                        </div>
                                    </div>
                                    <div className="flex justify-center gap-4 text-[10px] lg:text-xs font-mono mt-2 flex-none">
                                        <span className="flex items-center text-noc-cyan"><span className="w-2.5 h-2.5 rounded bg-noc-cyan mr-1.5"></span>เสร็จสิ้น {projectInfo.total > 0 ? ((projectInfo.installed/projectInfo.total)*100).toFixed(1) : 0}%</span>
                                        <span className="flex items-center text-noc-orange"><span className="w-2.5 h-2.5 rounded bg-noc-orange mr-1.5"></span>รอติดตั้ง {projectInfo.total > 0 ? ((projectInfo.remaining/projectInfo.total)*100).toFixed(1) : 0}%</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* CENTER: Main Analytics Chart (45%) */}
                        <div className="lg:w-[45%] scada-panel flex flex-col min-h-0 flex-none lg:flex-1">
                            <div className="bg-black/30 px-4 py-3 border-b border-white/5 flex justify-between items-center flex-none">
                                <span className="text-xs font-bold tracking-widest text-noc-textsec uppercase">PERFORMANCE TREND & DEPLOYMENT</span>
                                <div className="flex gap-4 text-xs font-mono">
                                    <span className="flex items-center text-noc-cyan"><span className="w-2.5 h-2.5 rounded bg-noc-cyan mr-1.5"></span>TOTAL</span>
                                    <span className="flex items-center text-noc-gold"><span className="w-2.5 h-2.5 rounded bg-noc-gold mr-1.5"></span>INSTALLED</span>
                                </div>
                            </div>
                            <div className="flex-1 w-full p-4 min-h-[250px]">
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={locationData} margin={{ top: 10, right: 10, left: -25, bottom: 0 }}>
                                        <defs>
                                            <linearGradient id="colorTotal" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#00F0FF" stopOpacity={0.3}/>
                                                <stop offset="95%" stopColor="#00F0FF" stopOpacity={0}/>
                                            </linearGradient>
                                            <linearGradient id="colorInstalled" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#F6C453" stopOpacity={0.5}/>
                                                <stop offset="95%" stopColor="#F6C453" stopOpacity={0}/>
                                            </linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="rgba(255,255,255,0.05)" />
                                        <XAxis dataKey="shortName" axisLine={false} tickLine={false} tick={{ fill: '#64748B', fontSize: 11, fontFamily: 'monospace' }} />
                                        <YAxis axisLine={false} tickLine={false} tick={{ fill: '#64748B', fontSize: 11, fontFamily: 'monospace' }} />
                                        <RechartsTooltip content={<CustomTooltip />} cursor={{ stroke: 'rgba(0,240,255,0.2)', strokeWidth: 2, strokeDasharray: '4 4' }}/>
                                        
                                        <Area type="monotone" dataKey="total" name="Total Nodes" stroke="#00F0FF" strokeWidth={2} fillOpacity={1} fill="url(#colorTotal)" />
                                        <Area type="monotone" dataKey="installed" name="Active Nodes" stroke="#F6C453" strokeWidth={2} fillOpacity={1} fill="url(#colorInstalled)" />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* RIGHT: Data Table (30%) */}
                        <div className="lg:w-[30%] flex flex-col gap-3 min-h-0 flex-none lg:flex-1">
                            
                            {/* Data Table Full Height */}
                            <div className="flex-1 scada-panel flex flex-col overflow-hidden">
                                <div className="bg-black/30 px-4 py-3 border-b border-white/5 flex justify-between items-center">
                                    <div className="flex items-center gap-2 text-xs lg:text-sm font-bold tracking-widest text-noc-textsec uppercase">
                                        <Icon name="MapPin" size={16} className="text-noc-cyan" />
                                        NODE STATUS DIRECTORY
                                    </div>
                                    <span className="text-noc-cyan bg-noc-cyan/10 px-2.5 py-1 rounded border border-noc-cyan/20 text-[10px] lg:text-xs font-bold">
                                        {locationData.length} ZONES
                                    </span>
                                </div>
                                <div className="flex-1 overflow-auto custom-scrollbar relative">
                                    <table className="w-full text-left font-mono">
                                        <thead className="text-xs text-slate-400 uppercase sticky top-0 bg-[#0A1121] z-10 shadow-md">
                                            <tr>
                                                <th className="px-3 py-3.5 font-semibold border-b border-white/10">Location</th>
                                                <th className="px-2 py-3.5 text-right font-semibold border-b border-white/10">Total</th>
                                                <th className="px-2 py-3.5 text-right font-semibold border-b border-white/10">Active</th>
                                                <th className="px-2 py-3.5 text-center font-semibold border-b border-white/10">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-sm font-medium">
                                            {locationData.map((row) => {
                                                const pct = row.total > 0 ? Math.round((row.installed/row.total)*100) : 0;
                                                return (
                                                    <tr key={row.id} className="hover:bg-noc-cyan/10 transition-colors group cursor-default border-b border-white/5">
                                                        <td className="px-3 py-4 text-slate-300 group-hover:text-white truncate max-w-[150px]">{row.shortName}</td>
                                                        <td className="px-2 py-4 text-right text-slate-400">{row.total}</td>
                                                        <td className="px-2 py-4 text-right font-bold text-noc-gold">{row.installed}</td>
                                                        <td className="px-2 py-4 text-center">
                                                            {pct === 100 ? (
                                                                <span className="text-noc-green bg-noc-green/10 px-2 py-0.5 rounded">OK</span>
                                                            ) : row.installed > 0 ? (
                                                                <span className="text-noc-orange bg-noc-orange/10 px-2 py-0.5 rounded">{pct}%</span>
                                                            ) : (
                                                                <span className="text-slate-500 bg-white/5 px-2 py-0.5 rounded">IDLE</span>
                                                            )}
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                        <tfoot className="text-sm lg:text-base font-bold sticky bottom-0 bg-[#0A1121] shadow-[0_-4px_10px_rgba(0,0,0,0.5)]">
                                            <tr>
                                                <td className="px-3 py-4 text-noc-gold border-t border-white/10">TOTAL / รวมทั้งหมด</td>
                                                <td className="px-2 py-4 text-right text-noc-gold border-t border-white/10">{projectInfo.total}</td>
                                                <td className="px-2 py-4 text-right text-noc-gold border-t border-white/10">{projectInfo.installed}</td>
                                                <td className="px-2 py-4 text-center text-noc-gold border-t border-white/10">
                                                    {projectInfo.progress}%
                                                </td>
                                            </tr>
                                        </tfoot>
                                    </table>
                                </div>
                            </div>
                            
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
